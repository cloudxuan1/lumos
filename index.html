<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Lumos · 韦斯莱时钟</title>
  <meta name="theme-color" content="#1b130c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lumos" />
  <link rel="apple-touch-icon" id="appIcon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    :root {
      --bg: #1b130c;
      --wood: #2c1e12;
      --wood-light: #3a2818;
      --brass: #c9a253;
      --brass-light: #e6c87a;
      --brass-dark: #8a6a2f;
      --face: #f1e2c0;
      --face-edge: #e3cd9c;
      --ink: #3a2a18;
      --muted: #7a6647;
      --red: #7a2d1f;
      --gold: #d4af37;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      background:
        radial-gradient(circle at 50% 0%, #2c1e12 0%, var(--bg) 60%) fixed,
        var(--bg);
      color: var(--face);
      font-family: 'Cinzel', Georgia, 'Songti SC', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 14px 60px;
    }
    .brand {
      font-family: 'Cinzel Decorative', 'Cinzel', serif;
      font-weight: 700;
      font-size: 34px;
      letter-spacing: 6px;
      color: var(--brass-light);
      text-shadow: 0 1px 0 var(--brass-dark), 0 2px 6px rgba(0,0,0,.6);
      margin: 4px 0 2px;
    }
    .tagline {
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 18px;
      text-transform: uppercase;
    }
    .clock-wrap {
      width: min(92vw, 420px);
      aspect-ratio: 1 / 1;
      margin-bottom: 26px;
      filter: drop-shadow(0 14px 26px rgba(0,0,0,.55));
    }
    .clock-wrap svg { width: 100%; height: 100%; display: block; }
    .arc-label {
      font-family: 'Cinzel Decorative', 'Cinzel', Georgia, serif;
      font-weight: 700;
      fill: #2e2012;
      letter-spacing: 1px;
      dominant-baseline: middle;
    }
    .hand { transition: transform .9s cubic-bezier(.34,1.4,.5,1); transform-box: view-box; transform-origin: 220px 220px; }
    .panel {
      width: min(94vw, 460px);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .card {
      background: linear-gradient(180deg, var(--wood-light), var(--wood));
      border: 2px solid var(--brass-dark);
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: inset 0 1px 0 rgba(230,200,122,.25), 0 4px 10px rgba(0,0,0,.4);
    }
    .card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .card-icon { font-size: 26px; line-height: 1; }
    .card-avatar {
      width: 30px; height: 30px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--brass); box-shadow: 0 0 0 1px var(--brass-dark);
    }
    .photo-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .photo-btn {
      border: 1px solid var(--brass-dark); border-radius: 8px;
      background: rgba(0,0,0,.2); color: var(--brass-light);
      font-family: Georgia, 'Songti SC', serif; font-size: 11px;
      padding: 5px 11px; cursor: pointer; line-height: 1.4;
    }
    .photo-btn:hover { background: rgba(201,162,83,.16); }
    .photo-btn.ghost { color: var(--muted); }
    .card-name { font-size: 17px; color: var(--brass-light); letter-spacing: 1px; flex: 1; }
    .card-now {
      font-family: Georgia, 'Songti SC', serif;
      font-size: 13px; color: var(--face);
      background: rgba(0,0,0,.25);
      border: 1px solid var(--brass-dark);
      border-radius: 999px; padding: 3px 10px; white-space: nowrap;
    }
    .mode-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .mode-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
    .toggle {
      display: inline-flex; border: 1px solid var(--brass-dark); border-radius: 999px;
      overflow: hidden; background: rgba(0,0,0,.25);
    }
    .toggle button {
      border: none; background: transparent; color: var(--muted);
      font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 1px;
      padding: 4px 14px; cursor: pointer; line-height: 1.4;
    }
    .toggle button.on { background: var(--brass); color: var(--ink); font-weight: 700; }
    .chips { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
    .chip {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      border: 1px solid var(--brass-dark); border-radius: 9px;
      background: rgba(0,0,0,.2); color: var(--face);
      font-family: Georgia, 'Songti SC', serif; font-size: 12px;
      padding: 7px 4px; cursor: pointer; line-height: 1.3;
      transition: background .15s, border-color .15s;
    }
    .chip:hover { background: rgba(201,162,83,.18); }
    .chip.active {
      background: var(--brass); color: var(--ink); font-weight: 700;
      border-color: var(--brass-light);
      box-shadow: 0 0 0 1px var(--brass-light);
    }
    .chip .e { font-size: 14px; }
    .locked-note {
      display: flex; align-items: center; gap: 6px;
      font-family: Georgia, 'Songti SC', serif; font-size: 12px; color: var(--muted);
    }
    .footer { margin-top: 26px; font-size: 10px; letter-spacing: 2px; color: var(--muted); }
    .conn { font-size: 10px; letter-spacing: 1px; margin-bottom: 14px; }
    .conn.ok { color: #7da06a; }
    .conn.err { color: var(--red); }
    .change-url {
      margin-top: 20px; width: min(94vw, 460px);
      border: 1px solid var(--brass-dark); border-radius: 10px;
      background: transparent; color: var(--muted);
      font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 1px;
      padding: 9px; cursor: pointer; line-height: 1.4;
    }
    .change-url:hover { background: rgba(201,162,83,.12); color: var(--brass-light); }
    /* 首次设定页 */
    .setup-wrap {
      min-height: 100vh; width: 100%;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .setup-card {
      background: linear-gradient(180deg, var(--wood-light), var(--wood));
      border: 2px solid var(--brass-dark); border-radius: 16px;
      padding: 30px 26px; max-width: 420px; width: 100%; text-align: center;
      box-shadow: inset 0 1px 0 rgba(230,200,122,.25), 0 12px 26px rgba(0,0,0,.55);
    }
    .setup-hint {
      font-family: Georgia, 'Songti SC', serif; font-size: 13px; color: var(--face);
      text-align: left; line-height: 1.7; margin-bottom: 12px;
    }
    .setup-eg { color: var(--muted); font-size: 11px; }
    .setup-input {
      width: 100%; padding: 11px; border: 1px solid var(--brass-dark); border-radius: 9px;
      background: rgba(0,0,0,.25); color: var(--face);
      font-family: 'Cinzel', monospace; font-size: 13px; outline: none;
      box-sizing: border-box; margin-bottom: 10px;
    }
    .setup-input:focus { border-color: var(--brass-light); }
    .setup-err { font-size: 11px; color: #e08a5a; margin-bottom: 10px; font-family: Georgia, serif; }
    .setup-btn {
      width: 100%; padding: 11px; border: 1px solid var(--brass-light); border-radius: 9px;
      background: var(--brass); color: var(--ink); font-weight: 700;
      font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 1px;
      cursor: pointer; line-height: 1.4;
    }
    .setup-btn:disabled { opacity: .5; cursor: default; }
    .setup-foot {
      font-family: Georgia, 'Songti SC', serif; font-size: 10px; color: var(--muted);
      margin-top: 16px; line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const h = React.createElement;

    // iPhone「添加到主屏幕」图标：Canvas 画黄铜时钟，设为 apple-touch-icon
    (function setAppIcon() {
      try {
        const S = 180, cv = document.createElement("canvas");
        cv.width = S; cv.height = S;
        const x = cv.getContext("2d");
        const g = x.createLinearGradient(0, 0, 0, S);
        g.addColorStop(0, "#e6c87a"); g.addColorStop(0.5, "#c9a253"); g.addColorStop(1, "#7c5d28");
        x.fillStyle = g; x.fillRect(0, 0, S, S);
        const cx = S / 2, cy = S / 2;
        x.beginPath(); x.arc(cx, cy, 74, 0, Math.PI * 2); x.fillStyle = "#efdcab"; x.fill();
        x.lineWidth = 9; x.strokeStyle = "#7c5d28"; x.stroke();
        [[-90, 56, "#9aa7ad"], [25, 46, "#c98a55"], [150, 36, "#b9a06a"]].forEach(([deg, len, col]) => {
          const a = deg * Math.PI / 180;
          x.beginPath(); x.moveTo(cx, cy);
          x.lineTo(cx + len * Math.cos(a), cy + len * Math.sin(a));
          x.lineWidth = 6; x.lineCap = "round"; x.strokeStyle = col; x.stroke();
        });
        x.beginPath(); x.arc(cx, cy, 8, 0, Math.PI * 2); x.fillStyle = "#241910"; x.fill();
        const link = document.getElementById("appIcon");
        if (link) link.setAttribute("href", cv.toDataURL("image/png"));
      } catch (e) {}
    })();

    // ── 配置：Supabase URL 从 hash / localStorage 取，不写死 ──
    // 支持 #https://xxx.supabase.co 直接带入；否则走首次设定页 SetupScreen
    function getApiUrl() {
      try {
        const hash = window.location.hash.slice(1);
        if (hash && hash.startsWith("http")) {
          const full = hash.replace(/\/$/, "") + "/functions/v1/lumos-api";
          localStorage.setItem("lumos_api_url", full);
          return full;
        }
        return localStorage.getItem("lumos_api_url") || "";
      } catch (e) {
        return "";
      }
    }
    function setApiUrl(url) {
      try { localStorage.setItem("lumos_api_url", url); } catch (e) {}
    }
    let API = getApiUrl();
    const POLL_MS = 20000;

    // ── 九个状态（围钟一圈，12 点起顺时针）──
    const STATUSES = [
      { key: "home",     emoji: "🏠", label: "在家",   en: "HOME" },
      { key: "work",     emoji: "💼", label: "在上班", en: "WORK" },
      { key: "overtime", emoji: "🔥", label: "在加班", en: "OVERTIME" },
      { key: "slacking", emoji: "🐟", label: "在摸鱼", en: "SLACKING" },
      { key: "travel",   emoji: "🚶", label: "在路上", en: "TRAVELLING" },
      { key: "playing",  emoji: "🎮", label: "在玩",   en: "PLAYING" },
      { key: "sleeping", emoji: "💤", label: "在睡觉", en: "BED" },
      { key: "study",    emoji: "💭", label: "在思考", en: "THINKING" },
      { key: "peril",    emoji: "⚠️", label: "性命攸关", en: "MORTAL PERIL" },
    ];
    const STATUS_INDEX = Object.fromEntries(STATUSES.map((s, i) => [s.key, i]));
    const statusMeta = (key) => STATUSES[STATUS_INDEX[key]] || STATUSES[0];

    // 指针外观：长度不同避免重叠
    const HAND_STYLE = {
      cloud: { len: 152, color: "#aebfc7" },
      crab:  { len: 120, color: "#d98050" },
      owl:   { len: 92,  color: "#efe6d2" },
    };

    // ── 自动逻辑 ──
    function cloudAutoStatus(now) {
      const day = now.getDay();                 // 0 周日 .. 6 周六
      const weekday = day >= 1 && day <= 5;
      const mins = now.getHours() * 60 + now.getMinutes();
      if (mins < 7 * 60) return "sleeping";       // 0:00–7:00 睡觉
      if (weekday && mins >= 8 * 60 + 30 && mins < 17 * 60 + 30) return "work"; // 工作日 8:30–17:30 上班
      return "home";                              // 其余在家
    }
    function nextAutoBoundary(now) {
      const marks = [7 * 60, 8 * 60 + 30, 17 * 60 + 30, 24 * 60];
      const mins = now.getHours() * 60 + now.getMinutes();
      const next = marks.find((m) => m > mins);
      const d = new Date(now);
      if (next === undefined || next >= 24 * 60) {
        d.setDate(d.getDate() + 1); d.setHours(0, 0, 0, 0);
      } else {
        d.setHours(Math.floor(next / 60), next % 60, 0, 0);
      }
      return d.toISOString();
    }
    function owlAutoRoll() {
      const r = Math.random();
      if (r < 0.03) return "peril";   // 极小概率：性命攸关（搞笑）
      if (r < 0.25) return "travel";  // 偶尔：出去送信
      return "sleeping";              // 大部分时间：睡觉
    }

    // ── API（Edge Function verify_jwt=false，无需 anon key）──
    async function fetchStatus() {
      const res = await fetch(API + "/status", { headers: { "Content-Type": "application/json" } });
      if (!res.ok) throw new Error("status " + res.status);
      return res.json();
    }
    async function patchStatus(entityId, body) {
      const res = await fetch(API + "/status/" + entityId, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error("patch " + res.status);
      return res.json();
    }

    // ── 钟面 ──
    function Clock({ rows, avatars }) {
      const C = 220;
      const rBand = 162, rSun1 = 30, rSun2 = 120;
      const polar = (r, deg) => {
        const a = (deg - 90) * Math.PI / 180;
        return [C + r * Math.cos(a), C + r * Math.sin(a)];
      };

      // 钟心放射光芒（很淡，电影里那种刻线感）
      const sun = [];
      for (let d = 0; d < 360; d += 7.5) {
        const [x1, y1] = polar(rSun1, d), [x2, y2] = polar(rSun2, d);
        sun.push(h("line", { key: "s" + d, x1, y1, x2, y2, stroke: "#9a7733", strokeWidth: 0.5, opacity: 0.13 }));
      }

      // 外缘波浪花边的小圆点
      const scallop = [];
      for (let d = 0; d < 360; d += 7.5) {
        const [cx, cy] = polar(186, d);
        scallop.push(h("circle", { key: "sc" + d, cx, cy, r: 2.4, fill: "#b89043", opacity: 0.5 }));
      }

      // 英文位置名沿弧排（无 emoji，每个独立旋转，底部翻正保证可读、不被接缝裁切）
      const labels = STATUSES.map((s, i) => {
        const deg = i * 40;
        const flip = deg > 90 && deg < 270;
        const fs = s.en.length >= 10 ? 11 : s.en.length >= 7 ? 13 : 16;
        const tx = C, ty = C - rBand;
        return h("g", { key: "l" + i, transform: "rotate(" + deg + " " + C + " " + C + ")" },
          h("text", {
            x: tx, y: ty, className: "arc-label", fontSize: fs, textAnchor: "middle",
            transform: flip ? "rotate(180 " + tx + " " + ty + ")" : undefined,
          }, s.en)
        );
      });

      // 三根勺形指针 + 椭圆相框（照片或 emoji）
      const handData = ["cloud", "crab", "owl"].map((id) => {
        const row = rows.find((r) => r.entity_id === id);
        if (!row) return null;
        const st = HAND_STYLE[id];
        const idx = STATUS_INDEX[row.status] ?? 0;
        return { id, row, st, deg: idx * 40, tipY: C - st.len };
      }).filter(Boolean);

      const clipDefs = handData.map((d) =>
        h("clipPath", { key: "c" + d.id, id: "clip-" + d.id },
          h("ellipse", { cx: C, cy: d.tipY, rx: 14, ry: 17.5 })
        )
      );

      const hands = handData.map((d) => {
        const { id, row, st, deg, tipY } = d;
        const shaft = [
          [C - 4.5, C + 10], [C + 4.5, C + 10],
          [C + 2.2, tipY + 14], [C - 2.2, tipY + 14],
        ].map((p) => p.join(",")).join(" ");
        const portrait = avatars && avatars[id]
          ? h("image", { href: avatars[id], xlinkHref: avatars[id], x: C - 14, y: tipY - 17.5, width: 28, height: 35, preserveAspectRatio: "xMidYMid slice", clipPath: "url(#clip-" + id + ")" })
          : h("text", { x: C, y: tipY + 6, textAnchor: "middle", fontSize: 17 }, row.icon);
        return h("g", { key: id, className: "hand", style: { transform: "rotate(" + deg + "deg)" } },
          h("polygon", { points: shaft, fill: st.color, stroke: "#241910", strokeWidth: 0.7 }),
          h("ellipse", { cx: C, cy: tipY, rx: 16, ry: 19.5, fill: "#241910", stroke: st.color, strokeWidth: 2.5 }),
          portrait,
          h("ellipse", { cx: C, cy: tipY, rx: 14, ry: 17.5, fill: "none", stroke: "#e6c87a", strokeWidth: 0.8, opacity: 0.6 })
        );
      });

      return h("div", { className: "clock-wrap" },
        h("svg", { viewBox: "0 0 440 440" },
          h("defs", null,
            h("radialGradient", { id: "face", cx: "50%", cy: "42%", r: "62%" },
              h("stop", { offset: "0%", stopColor: "#efdcab" }),
              h("stop", { offset: "70%", stopColor: "#e3c98e" }),
              h("stop", { offset: "100%", stopColor: "#cdaf76" })
            ),
            h("linearGradient", { id: "brass", x1: "0", y1: "0", x2: "0", y2: "1" },
              h("stop", { offset: "0%", stopColor: "#f0d493" }),
              h("stop", { offset: "45%", stopColor: "#c9a253" }),
              h("stop", { offset: "100%", stopColor: "#7c5d28" })
            ),
            h("radialGradient", { id: "hub", cx: "38%", cy: "34%", r: "70%" },
              h("stop", { offset: "0%", stopColor: "#f0d493" }),
              h("stop", { offset: "100%", stopColor: "#8a6a2f" })
            ),
            clipDefs
          ),
          h("circle", { cx: C, cy: C, r: 216, fill: "url(#brass)" }),
          h("circle", { cx: C, cy: C, r: 205, fill: "#241910" }),
          h("circle", { cx: C, cy: C, r: 200, fill: "url(#brass)" }),
          h("circle", { cx: C, cy: C, r: 192, fill: "url(#face)", stroke: "#7c5d28", strokeWidth: 1.5 }),
          h("g", null, sun),
          h("circle", { cx: C, cy: C, r: 176, fill: "none", stroke: "#9a7733", strokeWidth: 1, opacity: 0.4 }),
          h("circle", { cx: C, cy: C, r: 142, fill: "none", stroke: "#9a7733", strokeWidth: 0.8, opacity: 0.3 }),
          h("g", null, scallop),
          h("g", null, labels),
          hands,
          h("circle", { cx: C, cy: C, r: 15, fill: "url(#hub)", stroke: "#241910", strokeWidth: 2 }),
          h("circle", { cx: C, cy: C, r: 5, fill: "#241910" })
        )
      );
    }

    // ── 照片：读文件 → 缩放 → dataURL ──
    function avatarFromFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = () => {
          const img = new Image();
          img.onerror = reject;
          img.onload = () => {
            const max = 220;
            const scale = Math.min(1, max / Math.max(img.width, img.height));
            const w = Math.round(img.width * scale), hgt = Math.round(img.height * scale);
            const cv = document.createElement("canvas");
            cv.width = w; cv.height = hgt;
            cv.getContext("2d").drawImage(img, 0, 0, w, hgt);
            resolve(cv.toDataURL("image/jpeg", 0.82));
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // ── 控制卡 ──
    function ControlCard({ row, locked, avatar, onSetStatus, onSetMode, onAvatarFile, onAvatarClear }) {
      const meta = statusMeta(row.status);
      const fileRef = React.useRef(null);

      const head = h("div", { className: "card-head" },
        avatar
          ? h("img", { className: "card-avatar", src: avatar, alt: "" })
          : h("span", { className: "card-icon" }, row.icon),
        h("span", { className: "card-name" }, row.display_name),
        h("span", { className: "card-now" }, meta.emoji + " " + meta.label)
      );

      const photoRow = h("div", { className: "photo-row" },
        h("input", {
          ref: fileRef, type: "file", accept: "image/*", style: { display: "none" },
          onChange: (e) => { const f = e.target.files && e.target.files[0]; if (f) onAvatarFile(f); e.target.value = ""; },
        }),
        h("button", { className: "photo-btn", onClick: () => fileRef.current && fileRef.current.click() }, "📷 " + (avatar ? "换照片" : "设照片")),
        avatar && h("button", { className: "photo-btn ghost", onClick: onAvatarClear }, "用回 emoji")
      );

      if (locked) {
        return h("div", { className: "card" }, head, photoRow,
          h("div", { className: "locked-note" }, "🔒 由 Claude 掌管（MCP 更新）")
        );
      }

      const modeRow = h("div", { className: "mode-row" },
        h("span", { className: "mode-label" }, "模式"),
        h("div", { className: "toggle" },
          h("button", { className: row.mode === "auto" ? "on" : "", onClick: () => onSetMode("auto") }, "自动"),
          h("button", { className: row.mode === "manual" ? "on" : "", onClick: () => onSetMode("manual") }, "手动")
        )
      );

      const chips = h("div", { className: "chips" },
        STATUSES.map((s) =>
          h("div", {
            key: s.key,
            className: "chip" + (s.key === row.status ? " active" : ""),
            onClick: () => onSetStatus(s.key),
          }, h("span", { className: "e" }, s.emoji), s.label)
        )
      );

      return h("div", { className: "card" }, head, photoRow, modeRow, chips);
    }

    // ── 首次设定页：填 Supabase Project URL ──
    function SetupScreen({ onDone }) {
      const [url, setUrl] = React.useState("");
      const [testing, setTesting] = React.useState(false);
      const [err, setErr] = React.useState("");

      const doConnect = async () => {
        setTesting(true);
        setErr("");
        const base = url.trim().replace(/\/$/, "");
        const full = base + "/functions/v1/lumos-api";
        try {
          const res = await fetch(full + "/health", { headers: { "Content-Type": "application/json" } });
          if (!res.ok) throw new Error("" + res.status);
          setApiUrl(full);
          API = full;
          window.location.hash = base;
          onDone();
        } catch (e) {
          setErr("连接失败 — 请确认 URL 正确且 lumos-api 已部署");
        }
        setTesting(false);
      };

      return h("div", { className: "setup-wrap" },
        h("div", { className: "setup-card" },
          h("div", { className: "brand", style: { fontSize: 30, marginBottom: 2 } }, "LUMOS"),
          h("div", { className: "tagline", style: { marginBottom: 18 } }, "First-time Setup · 首次设定"),
          h("div", { className: "setup-hint" },
            "输入你的 Supabase Project URL：",
            h("br", null),
            h("span", { className: "setup-eg" }, "例如 https://xxxxx.supabase.co")
          ),
          h("input", {
            className: "setup-input",
            value: url,
            onChange: (e) => setUrl(e.target.value),
            placeholder: "https://xxxxx.supabase.co",
            onKeyDown: (e) => { if (e.key === "Enter" && url.trim() && !testing) doConnect(); },
          }),
          err && h("div", { className: "setup-err" }, err),
          h("button", {
            className: "setup-btn",
            onClick: doConnect,
            disabled: !url.trim() || testing,
          }, testing ? "测试中…" : "连接 Connect"),
          h("div", { className: "setup-foot" }, "需要先完成 Supabase 部署（clock_status 表 + lumos-api）")
        )
      );
    }

    // ── App ──
    function App() {
      const [ready, setReady] = React.useState(!!getApiUrl());
      const [rows, setRows] = React.useState([]);
      const [conn, setConn] = React.useState("loading"); // loading | ok | err
      const rowsRef = React.useRef([]);
      rowsRef.current = rows;

      // 头像存浏览器本地（dataURL），跨设备同步以后再做数据库
      const [avatars, setAvatars] = React.useState(() => {
        const o = {};
        ["cloud", "crab", "owl"].forEach((id) => {
          try { o[id] = localStorage.getItem("lumos_avatar_" + id) || null; } catch (e) { o[id] = null; }
        });
        return o;
      });
      const setAvatar = (id, dataUrl) => {
        try {
          if (dataUrl) localStorage.setItem("lumos_avatar_" + id, dataUrl);
          else localStorage.removeItem("lumos_avatar_" + id);
        } catch (e) {}
        setAvatars((prev) => ({ ...prev, [id]: dataUrl }));
      };
      const handleAvatarFile = (id) => async (file) => {
        try { setAvatar(id, await avatarFromFile(file)); } catch (e) {}
      };

      const load = React.useCallback(async () => {
        try {
          const data = await fetchStatus();
          setRows(data);
          setConn("ok");
          return data;
        } catch (e) {
          setConn("err");
          return null;
        }
      }, []);

      // 自动模式评估（前端驱动，仅在状态真正变化时写库）
      const runAuto = React.useCallback(async (data) => {
        const now = new Date();
        const jobs = [];
        for (const row of data) {
          let mode = row.mode;
          // 手动到期 → 回到自动
          if (mode === "manual" && row.manual_until && new Date(row.manual_until) <= now) {
            mode = "auto";
            jobs.push(patchStatus(row.entity_id, { mode: "auto" }).catch(() => {}));
          }
          if (mode !== "auto") continue;
          if (row.entity_id === "cloud") {
            const target = cloudAutoStatus(now);
            if (target !== row.status) jobs.push(patchStatus("cloud", { status: target }).catch(() => {}));
          } else if (row.entity_id === "owl") {
            if (Math.random() < 0.12) {
              const target = owlAutoRoll();
              if (target !== row.status) jobs.push(patchStatus("owl", { status: target }).catch(() => {}));
            }
          }
        }
        if (jobs.length) { await Promise.all(jobs); await load(); }
      }, [load]);

      React.useEffect(() => {
        if (!ready) return;
        let alive = true;
        (async () => {
          const data = await load();
          if (alive && data) runAuto(data);
        })();
        const id = setInterval(async () => {
          const data = await load();
          if (alive && data) runAuto(data);
        }, POLL_MS);
        return () => { alive = false; clearInterval(id); };
      }, [ready, load, runAuto]);

      // 乐观更新 + 持久化
      const optimistic = (entityId, patch) => {
        setRows((prev) => prev.map((r) => (r.entity_id === entityId ? { ...r, ...patch } : r)));
      };
      const setStatus = (entityId) => (statusKey) => {
        const manual_until = nextAutoBoundary(new Date());
        optimistic(entityId, { status: statusKey, mode: "manual", manual_until });
        patchStatus(entityId, { status: statusKey, mode: "manual", manual_until }).then(load).catch(() => setConn("err"));
      };
      const setMode = (entityId) => (mode) => {
        optimistic(entityId, { mode });
        patchStatus(entityId, { mode }).then(async () => {
          const data = await load();
          if (data) runAuto(data);
        }).catch(() => setConn("err"));
      };

      const changeUrl = () => {
        try { localStorage.removeItem("lumos_api_url"); } catch (e) {}
        history.replaceState(null, "", window.location.pathname + window.location.search);
        window.location.reload();
      };

      if (!ready) return h(SetupScreen, { onDone: () => setReady(true) });

      const byId = (id) => rows.find((r) => r.entity_id === id);
      const connText = conn === "ok" ? "● 已连接钟面" : conn === "err" ? "● 连接失败，稍后重试" : "● 连接中…";

      return h(React.Fragment, null,
        h("div", { className: "brand" }, "LUMOS"),
        h("div", { className: "tagline" }, "The Weasley Clock"),
        h("div", { className: "conn " + (conn === "ok" ? "ok" : conn === "err" ? "err" : "") }, connText),
        h(Clock, { rows, avatars }),
        h("div", { className: "panel" },
          byId("cloud") && h(ControlCard, { key: "cloud", row: byId("cloud"), locked: false, avatar: avatars.cloud, onSetStatus: setStatus("cloud"), onSetMode: setMode("cloud"), onAvatarFile: handleAvatarFile("cloud"), onAvatarClear: () => setAvatar("cloud", null) }),
          byId("owl") && h(ControlCard, { key: "owl", row: byId("owl"), locked: false, avatar: avatars.owl, onSetStatus: setStatus("owl"), onSetMode: setMode("owl"), onAvatarFile: handleAvatarFile("owl"), onAvatarClear: () => setAvatar("owl", null) }),
          byId("crab") && h(ControlCard, { key: "crab", row: byId("crab"), locked: true, avatar: avatars.crab, onAvatarFile: handleAvatarFile("crab"), onAvatarClear: () => setAvatar("crab", null) })
        ),
        h("button", { className: "change-url", onClick: changeUrl }, "更换 Supabase URL"),
        h("div", { className: "footer" }, "Mischief Managed")
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
